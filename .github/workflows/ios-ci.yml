name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project RediM8.xcodeproj -scheme RediM8

      - name: Build
        run: >
          xcodebuild
          -project RediM8.xcodeproj
          -scheme RediM8
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Test
        run: |
          set -euo pipefail

          destination="$(
            xcodebuild -project RediM8.xcodeproj -scheme RediM8 -showdestinations 2>/dev/null \
              | grep -m1 'platform:iOS Simulator,.*name:iPhone' \
              | sed -E 's/.*id:([^,}]+).*/platform=iOS Simulator,id=\1/'
          )"

          if [ -z "$destination" ]; then
            echo "No iOS Simulator destination found"
            exit 1
          fi

          echo "Using simulator destination: $destination"

          xcodebuild test \
            -project RediM8.xcodeproj \
            -scheme RediM8 \
            -destination "$destination" \
            CODE_SIGNING_ALLOWED=NO
