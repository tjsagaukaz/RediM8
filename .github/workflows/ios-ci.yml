name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project RediM8.xcodeproj -scheme RediM8

      - name: Build
        run: >
          xcodebuild
          -project RediM8.xcodeproj
          -scheme RediM8
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Select simulator destination
        id: simulator
        run: |
          set -euo pipefail

          destination="$(
            python3 - <<'PY'
import json
import subprocess

data = json.loads(
    subprocess.check_output(
        ["xcrun", "simctl", "list", "devices", "available", "-j"],
        text=True
    )
)

candidates = []
for runtime_identifier, devices in data["devices"].items():
    if "SimRuntime.iOS" not in runtime_identifier:
        continue

    for device in devices:
        if device.get("isAvailable") and device["name"].startswith("iPhone"):
            candidates.append((runtime_identifier, device["name"], device["udid"]))

if not candidates:
    raise SystemExit("No available iPhone simulator found")

def runtime_key(candidate):
    runtime_identifier, device_name, _ = candidate
    version = runtime_identifier.split("iOS-")[-1].replace("-", ".")
    parts = tuple(int(part) for part in version.split(".") if part.isdigit())
    return (parts, device_name)

_, _, udid = sorted(candidates, key=runtime_key, reverse=True)[0]
print(f"platform=iOS Simulator,id={udid}")
PY
          )"

          echo "destination=$destination" >> "$GITHUB_OUTPUT"
          echo "Using simulator destination: $destination"

      - name: Test
        run: >
          xcodebuild test
          -project RediM8.xcodeproj
          -scheme RediM8
          -destination '${{ steps.simulator.outputs.destination }}'
          CODE_SIGNING_ALLOWED=NO
