name: RediM8
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: 17.0
settings:
  base:
    PRODUCT_NAME: RediM8
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    OTHER_LDFLAGS:
      - "$(inherited)"
      - "-lsqlite3"
attributes:
  ORGANIZATIONNAME: RediM8
packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution.git
    exactVersion: 6.9.0
targets:
  RediM8:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RediM8
        excludes:
          - Data/*.json
      - path: RediM8/Data/Emergency72HourPlan.json
        buildPhase: resources
      - path: RediM8/Data/Gear.json
        buildPhase: resources
      - path: RediM8/Data/GoBagItems.json
        buildPhase: resources
      - path: RediM8/Data/Guides.json
        buildPhase: resources
      - path: RediM8/Data/FireTrails.json
        buildPhase: resources
      - path: RediM8/Data/MapPacks.json
        buildPhase: resources
      - path: RediM8/Data/ResourceCategories.json
        buildPhase: resources
      - path: RediM8/Data/ResourceLocations.json
        buildPhase: resources
      - path: RediM8/Data/Scenarios.json
        buildPhase: resources
      - path: RediM8/Data/Shelters.json
        buildPhase: resources
      - path: RediM8/Data/Tasks.json
        buildPhase: resources
      - path: RediM8/Data/TrackSegments.json
        buildPhase: resources
      - path: RediM8/Data/WaterPoints.json
        buildPhase: resources
    resources:
      - path: RediM8/Resources
    dependencies:
      - package: MapLibre
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.redim8.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: RediM8/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - RediM8Tests
  RediM8Tests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - RediM8Tests
    dependencies:
      - target: RediM8
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: RediM8Tests
        PRODUCT_MODULE_NAME: RediM8Tests
